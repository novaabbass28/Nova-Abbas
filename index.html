<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portofolio Nova</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff;
            --text: #2d3436;
            --accent: #a29bfe; /* Warna pastel ungu lembut */
            --shadow: rgba(149, 157, 165, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            overflow-x: hidden;
        }

        /* Animasi Muncul Pertama Kali */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        header {
            padding: 30px 10%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: fadeInUp 0.8s ease;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 30px;
        }

        nav a {
            text-decoration: none;
            color: var(--text);
            font-size: 0.9rem;
            font-weight: 500;
            opacity: 0.7;
            transition: 0.3s;
        }

        nav a:hover { opacity: 1; }

        /* Hero section lebih clean */
        .hero {
            padding: 60px 10%;
            max-width: 800px;
            animation: fadeInUp 1s ease;
        }

        .hero h1 {
            font-size: 3rem;
            line-height: 1.2;
            margin-bottom: 20px;
            font-weight: 600;
        }

        /* Container Kartu */
        .content-section {
            padding: 20px 10% 100px;
            animation: fadeInUp 1.2s ease;
        }

        .section-label {
            text-align: right;
            font-size: 1.2rem;
            margin-bottom: 40px;
            color: #b2bec3;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 40px;
        }

        /* Kartu dengan animasi halus */
        .card {
            cursor: pointer;
            text-decoration: none;
            color: inherit;
        }

        .img-container {
            width: 100%;
            aspect-ratio: 4/5;
            border-radius: 24px;
            overflow: hidden;
            background: #f1f2f6;
            margin-bottom: 15px;
            box-shadow: 0 10px 30px var(--shadow);
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
        }

        .card:hover .img-container {
            transform: translateY(-15px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        .card:hover img {
            transform: scale(1.1);
        }

        .card h3 {
            font-size: 1rem;
            font-weight: 500;
            text-align: center;
            opacity: 0.8;
            transition: 0.3s;
        }

        .card:hover h3 {
            opacity: 1;
            transform: translateY(-5px);
            color: var(--accent);
        }

        /* Responsif HP */
        @media (max-width: 768px) {
            .hero h1 { font-size: 2rem; }
            nav { display: none; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo" style="font-weight: 600;">NOVA</div>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Profile</a></li>
                <li><a href="#">Product</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="hero">
            <h1>E-Portfolio <br> Digital Space.</h1>
            <p style="color: #636e72;">Universitas Yatsi Madani — Business Process Management</p>
        </section>

        <section class="content-section">
            <div class="section-label">To My Profile —</div>
            
            <div class="card-grid">
                <a href="#" class="card">
                    <div class="img-container">
                        <img src="https://via.placeholder.com/400x500" alt="Profil">
                    </div>
                    <h3>Profil Mahasiswa</h3>
                </a>

                <a href="#" class="card">
                    <div class="img-container">
                        <img src="https://via.placeholder.com/400x500" alt="Artefak">
                    </div>
                    <h3>Artefak Produk</h3>
                </a>

                <a href="#" class="card">
                    <div class="img-container">
                        <img src="https://via.placeholder.com/400x500" alt="Lampiran">
                    </div>
                    <h3>Lampiran</h3>
                </a>
            </div>
        </section>
    </main>

</body>
</html>
